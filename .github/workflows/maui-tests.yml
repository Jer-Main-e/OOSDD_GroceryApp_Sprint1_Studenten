name: MAUI Unit Tests (Windows)

on:
  push:
    branches:
      - main
      - infra/runner-toevoegen
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # Restore only the unit test project (avoiding iOS targets)
      - name: Restore dependencies
        run: dotnet restore ./GroceryApp.Tests/GroceryApp.Tests.csproj

      - name: Build unit tests
        run: dotnet build ./GroceryApp.Tests/GroceryApp.Tests.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test ./GroceryApp.Tests/GroceryApp.Tests.csproj --configuration Release --no-build --verbosity normal
